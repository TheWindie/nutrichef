services:
  db:
    image: postgres:16-alpine
    container_name: nutrichef-db-dev
    environment:
      POSTGRES_DB: nutrichef
      POSTGRES_USER: nutrichef
      POSTGRES_PASSWORD: nutrichef
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrichef"]
      interval: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nutrichef-backend-dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nutrichef:nutrichef@db:5432/nutrichef
      APP_ENV: development
    volumes:
      - ./backend:/app          # hot reload
      - ./data:/data:ro
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seeds.run &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata_dev:
