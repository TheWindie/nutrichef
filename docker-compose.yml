services:

  db:
    image: postgres:16-alpine
    container_name: nutrichef-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nutrichef
      POSTGRES_USER: nutrichef
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nutrichef}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrichef"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nutrichef

  backend:
    image: ghcr.io/${GITHUB_USER:-thewindie}/nutrichef-backend:latest
    container_name: nutrichef-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nutrichef:${DB_PASSWORD:-nutrichef}@db:5432/nutrichef
      APP_ENV: production
    volumes:
      - nutrichef-data:/data:ro
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seeds.run &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - nutrichef

  frontend:
    image: ghcr.io/${GITHUB_USER:-thewindie}/nutrichef-frontend:latest
    container_name: nutrichef-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3100}:80"
    networks:
      - nutrichef

networks:
  nutrichef:
    driver: bridge

volumes:
  pgdata:
  nutrichef-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-/opt/nutrichef/data}
